info:
  name: change_role
  type: http
  seq: 10

http:
  method: PATCH
  url: http://127.0.0.1:8000/users/1/role
  body:
    type: json
    data: |-
      {
        "role": "viewer"
      }
  auth:
    type: bearer
    token: "{{Bearer}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
